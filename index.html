<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#070709" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>Voidline Chronos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="chronos.css?v=13" />
  <script>
    window.__SUPABASE_URL__ = "%VITE_SUPABASE_URL%";
    window.__SUPABASE_ANON_KEY__ = "%VITE_SUPABASE_ANON_KEY%";
  </script>
</head>
<body>
  <div class="tactical-shell">
    <div class="hud-rail">
      <span>SYS // <strong class="pulse" id="hud-sys">LINKING</strong></span>
      <span>ROOM // <strong>VOIDLINE-CHRONOS</strong></span>
      <span>MODE // <strong id="hud-mode">BOOT</strong></span>
    </div>

    <section class="game-panel" aria-label="Chronos tactical viewport">
      <div class="game-panel__chrome">
        <span class="tag" id="panel-tag">CHRONOS // TACTICAL HUD</span>
        <span class="meta" id="panel-meta">NEON GRID ONLINE</span>
      </div>
      <div class="game-panel__viewport">
        <canvas id="game" aria-label="Voidline Chronos"></canvas>
      </div>
      <nav class="hud-dock" id="hud-dock" aria-label="Tactical menu">
        <button type="button" class="tactical-btn" data-mode="tower">Tower</button>
        <button type="button" class="tactical-btn" data-mode="forge">Forge</button>
        <button type="button" class="tactical-btn" data-mode="tree">Tree</button>
        <button type="button" class="tactical-btn" data-mode="gate">Gate</button>
        <button type="button" class="tactical-btn" data-mode="era">Era</button>
        <button type="button" class="tactical-btn" data-mode="life">Life</button>
        <button type="button" class="tactical-btn" data-mode="story">Story</button>
        <button type="button" class="tactical-btn tactical-btn--ghost" data-mode="hub">Hub</button>
      </nav>
    </section>
  </div>

  <noscript>JavaScript required.</noscript>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="cloud-auth.js?v=13"></script>
  <script src="player-core.js?v=13"></script>
  <script src="chronos-data.js?v=13"></script>
  <script src="chronos.js?v=13"></script>
</body>
</html>
