<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1" />
  <meta name="theme-color" content="#030712" />
  <title>Syndicate Dungeon Grinder</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
</head>
<body class="text-white overflow-hidden select-none">
  <div id="app" class="h-[100dvh] w-screen flex flex-col">
    <header class="glass-chrome shrink-0 z-30 flex items-center justify-between gap-3 px-3 sm:px-4 py-2.5 border-b">
      <div class="min-w-0">
        <p class="text-[9px] tracking-[0.28em] uppercase text-amber-300/90 font-black">Syndicate · Co-op Grinder</p>
        <h1 class="text-sm sm:text-base font-black truncate tracking-tight">Isometric Dungeon</h1>
      </div>
      <div class="flex items-center gap-2">
        <span id="auth-label" class="hidden sm:inline text-[10px] text-slate-400 font-mono max-w-[9rem] truncate">Guest</span>
        <button type="button" id="btn-auth" class="tactile tactile--sm tactile--ghost">
          <span class="tactile__depth" aria-hidden="true"></span>
          <span class="tactile__face">
            <span class="tactile__sheen" aria-hidden="true"></span>
            <span class="tactile__label">Google Sign-In</span>
          </span>
        </button>
      </div>
    </header>

    <div id="chassis" class="flex-1 min-h-0 relative overflow-hidden">
      <div id="panel-track" class="panel-track h-full">
        <section id="panel-market" class="panel-slide panel-slide--glass" data-panel="market" aria-label="Gacha Market"></section>

        <section id="panel-hub" class="panel-slide relative" data-panel="hub" aria-label="Battle Hub">
          <canvas id="combat-canvas" class="absolute inset-0 w-full h-full block"></canvas>
          <canvas id="combat-hud" class="absolute inset-0 w-full h-full block pointer-events-none"></canvas>
          <div id="hub-chrome" class="absolute inset-0 z-10"></div>
        </section>

        <section id="panel-clan" class="panel-slide panel-slide--glass" data-panel="clan" aria-label="Clan Matrix"></section>
      </div>
    </div>

    <nav class="glass-chrome tab-dock shrink-0 z-30">
      <button type="button" class="tactile tactile--md tactile--block tactile--ghost" data-go="market">
        <span class="tactile__depth" aria-hidden="true"></span>
        <span class="tactile__face">
          <span class="tactile__sheen" aria-hidden="true"></span>
          <span class="tactile__label">Market</span>
        </span>
      </button>
      <button type="button" class="tactile tactile--md tactile--block tactile--active" data-go="hub">
        <span class="tactile__depth" aria-hidden="true"></span>
        <span class="tactile__face">
          <span class="tactile__sheen" aria-hidden="true"></span>
          <span class="tactile__label">Battle</span>
        </span>
      </button>
      <button type="button" class="tactile tactile--md tactile--block tactile--ghost" data-go="clan">
        <span class="tactile__depth" aria-hidden="true"></span>
        <span class="tactile__face">
          <span class="tactile__sheen" aria-hidden="true"></span>
          <span class="tactile__label">Clan</span>
        </span>
      </button>
    </nav>
  </div>

  <div id="skill-overlay" class="hidden fixed inset-0 z-40 bg-[#02010a]">
    <canvas id="skill-canvas" class="absolute inset-0 w-full h-full"></canvas>
    <div class="absolute top-0 inset-x-0 p-4 flex items-center justify-between pointer-events-none">
      <div class="glass-panel px-4 py-3 pointer-events-none">
        <p class="text-[10px] tracking-[0.3em] uppercase text-amber-300 font-black">Skyward Constellation</p>
        <p class="text-xs text-slate-400">Pinch / scroll zoom · drag pan · tap star to unlock</p>
      </div>
      <button type="button" id="btn-close-skills" class="tactile tactile--md tactile--ghost pointer-events-auto">
        <span class="tactile__depth" aria-hidden="true"></span>
        <span class="tactile__face">
          <span class="tactile__sheen" aria-hidden="true"></span>
          <span class="tactile__label">Descend</span>
        </span>
      </button>
    </div>
  </div>

  <div id="trade-modal" class="hidden fixed inset-0 z-50"></div>
  <div id="invite-overlay" class="hidden fixed inset-0 z-[60]"></div>
  <div id="toast" class="toast"></div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
