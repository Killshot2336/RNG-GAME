<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1" />
  <meta name="theme-color" content="#070b14" />
  <title>Syndicate Dungeon Grinder</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
</head>
<body class="bg-void text-white font-display overflow-hidden select-none">
  <div id="app" class="h-[100dvh] w-screen flex flex-col">
    <!-- Top auth / brand strip -->
    <header class="shrink-0 z-30 flex items-center justify-between gap-3 px-3 sm:px-4 py-2 border-b border-white/10 bg-[#0b1a33]/95 backdrop-blur">
      <div class="min-w-0">
        <p class="text-[9px] tracking-[0.28em] uppercase text-amber-300/90 font-black">Syndicate · Co-op Grinder</p>
        <h1 class="text-sm sm:text-base font-black truncate">Isometric Dungeon</h1>
      </div>
      <div class="flex items-center gap-2">
        <span id="auth-label" class="hidden sm:inline text-[10px] text-slate-400 font-mono max-w-[9rem] truncate">Guest</span>
        <button type="button" id="btn-auth" class="px-3 py-1.5 rounded-lg bg-white/10 border border-white/20 text-[10px] font-black uppercase tracking-wider hover:bg-white/20">
          Google Sign-In
        </button>
      </div>
    </header>

    <!-- Clash Royale 3-panel swipe chassis -->
    <div id="chassis" class="flex-1 min-h-0 relative overflow-hidden">
      <div id="panel-track" class="panel-track h-full">
        <!-- LEFT: Market -->
        <section id="panel-market" class="panel-slide" data-panel="market" aria-label="Gacha Market"></section>

        <!-- CENTER: Battle Hub -->
        <section id="panel-hub" class="panel-slide relative" data-panel="hub" aria-label="Battle Hub">
          <canvas id="combat-canvas" class="absolute inset-0 w-full h-full block"></canvas>
          <canvas id="combat-hud" class="absolute inset-0 w-full h-full block pointer-events-none"></canvas>
          <div id="hub-chrome" class="absolute inset-0 z-10"></div>
        </section>

        <!-- RIGHT: Clan -->
        <section id="panel-clan" class="panel-slide bg-[#081018]" data-panel="clan" aria-label="Clan Matrix"></section>
      </div>
    </div>

    <!-- Bottom tab dock -->
    <nav class="shrink-0 z-30 grid grid-cols-3 gap-1 p-2 border-t border-white/10 bg-[#0b1a33]">
      <button type="button" class="tab-btn" data-go="market">Market</button>
      <button type="button" class="tab-btn tab-btn-active" data-go="hub">Battle</button>
      <button type="button" class="tab-btn" data-go="clan">Clan</button>
    </nav>
  </div>

  <!-- Skill constellation overlay -->
  <div id="skill-overlay" class="hidden fixed inset-0 z-40 bg-[#02010a]">
    <canvas id="skill-canvas" class="absolute inset-0 w-full h-full"></canvas>
    <div class="absolute top-0 inset-x-0 p-4 flex items-center justify-between pointer-events-none">
      <div class="pointer-events-none">
        <p class="text-[10px] tracking-[0.3em] uppercase text-amber-300 font-black">Skyward Constellation</p>
        <p class="text-xs text-slate-400">Pinch / scroll zoom · drag pan · tap star to unlock</p>
      </div>
      <button type="button" id="btn-close-skills" class="pointer-events-auto px-4 py-2 rounded-xl bg-white/10 border border-white/20 text-xs font-black uppercase tracking-wider">Descend</button>
    </div>
  </div>

  <div id="trade-modal" class="hidden fixed inset-0 z-50"></div>
  <div id="invite-overlay" class="hidden fixed inset-0 z-[60]"></div>
  <div id="toast" class="toast"></div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
