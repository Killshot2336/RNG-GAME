<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/voidline-icon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#1A2E12" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Voidline Galaxy Farm</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Exo+2:wght@400;500;600;700;800&family=Fredoka:wght@500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <style>
    :root {
      --void: #1A2E12; --void-deep: #0F1A0A; --panel: rgba(34,60,24,0.72);
      --neon-purple: #3D5A1E; --neon-glow: #84CC16; --green: #4ADE80;
      --gold: #FACC15; --pink: #F472B6; --cyan: #38BDF8; --muted: #A3E635; --text: #FEF9C3;
      --font-display: "Fredoka", "Audiowide", system-ui, sans-serif;
      --font-body: "Exo 2", system-ui, sans-serif;
      --font-mono: "Share Tech Mono", monospace;
    }
    *, *::before, *::after { box-sizing: border-box; }
    html { height: 100%; height: 100dvh; }
    body {
      height: 100%; height: 100dvh; margin: 0; padding: 0;
      overflow: hidden; background: var(--void-deep); color: var(--text);
      font-family: var(--font-body); -webkit-font-smoothing: antialiased;
    }
    #voidline-app {
      height: 100%; height: 100dvh; width: 100%; min-height: 0;
      display: flex; align-items: stretch; justify-content: center;
      position: relative; overflow: hidden;
    }
    .backdrop-gradient { position: fixed; inset: 0; pointer-events: none; background: radial-gradient(ellipse at 50% 50%, rgba(74,222,128,0.12) 0%, #0F1A0A 70%); }
    .phone-inner {
      position: relative; display: flex; flex-direction: column;
      width: 100%; max-width: 28rem; height: 100%; height: 100dvh;
      max-height: 100dvh; min-height: 0; flex: 1 1 auto;
      background: var(--void);
      border-left: 1px solid var(--neon-purple);
      border-right: 1px solid var(--neon-purple);
      box-shadow: 0 0 50px rgba(61,0,102,0.6);
      overflow: hidden; transition: filter 0.35s ease;
    }
    .phone-inner.dimmed { filter: brightness(0.4); }
    .void-bg { background-color: var(--void); background-image: radial-gradient(ellipse 120% 80% at 50% -20%, rgba(74,222,128,0.2) 0%, transparent 55%), radial-gradient(ellipse 80% 60% at 100% 100%, rgba(250,204,21,0.1) 0%, transparent 50%); }
    .void-bg::before { content: ""; position: absolute; inset: 0; pointer-events: none; background-image: radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,0.7) 0%, transparent 100%), radial-gradient(1px 1px at 72% 42%, rgba(255,255,255,0.6) 0%, transparent 100%), radial-gradient(1.5px 1.5px at 55% 15%, rgba(250,204,21,0.7) 0%, transparent 100%); animation: star-twinkle 4s ease-in-out infinite alternate; }
    .tab-bg-battle { background-image: radial-gradient(ellipse 100% 60% at 50% 0%, rgba(239,68,68,0.12) 0%, transparent 50%), radial-gradient(ellipse 80% 50% at 100% 100%, rgba(74,222,128,0.08) 0%, transparent 45%), radial-gradient(ellipse 120% 80% at 50% -20%, rgba(74,222,128,0.18) 0%, transparent 55%); }
    .tab-bg-shop { background-image: radial-gradient(ellipse 90% 55% at 20% 0%, rgba(250,204,21,0.15) 0%, transparent 50%), radial-gradient(ellipse 70% 45% at 90% 80%, rgba(56,189,248,0.08) 0%, transparent 45%); }
    .tab-bg-index { background-image: radial-gradient(ellipse 85% 50% at 50% 10%, rgba(132,204,22,0.14) 0%, transparent 48%), radial-gradient(ellipse 60% 40% at 10% 90%, rgba(250,204,21,0.08) 0%, transparent 40%); }
    .tab-bg-map { background-image: radial-gradient(ellipse 100% 55% at 50% 0%, rgba(56,189,248,0.14) 0%, transparent 50%), radial-gradient(ellipse 80% 50% at 0% 100%, rgba(74,222,128,0.1) 0%, transparent 45%); }
    .tab-bg-casino { background-image: radial-gradient(ellipse 90% 50% at 50% 0%, rgba(236,72,153,0.12) 0%, transparent 48%), radial-gradient(ellipse 70% 45% at 100% 100%, rgba(250,204,21,0.1) 0%, transparent 42%); }
    .tab-bg-coop { background-image: radial-gradient(ellipse 85% 50% at 30% 0%, rgba(163,230,53,0.12) 0%, transparent 48%); }
    .tab-bg-farm { background-image: radial-gradient(ellipse 90% 55% at 50% 20%, rgba(56,189,248,0.12) 0%, transparent 50%), radial-gradient(ellipse 70% 45% at 80% 90%, rgba(74,222,128,0.1) 0%, transparent 45%); }
    @keyframes star-twinkle { 0%,100%{opacity:0.3} 50%{opacity:0.9} }
    @keyframes neon-pulse { 0%,100%{box-shadow:0 0 15px rgba(168,85,247,0.35), inset 0 1px 0 rgba(255,255,255,0.08)} 50%{box-shadow:0 0 22px rgba(168,85,247,0.55), 0 0 45px rgba(57,255,20,0.12)} }
    @keyframes neon-pulse-green { 0%,100%{box-shadow:0 0 15px rgba(57,255,20,0.35)} 50%{box-shadow:0 0 24px rgba(57,255,20,0.55)} }
    @keyframes shimmer-slide { 0%{transform:translateX(-120%) skewX(-12deg)} 100%{transform:translateX(220%) skewX(-12deg)} }
    @keyframes avatar-orbit { 0%{transform:rotate(0deg)} 100%{transform:rotate(360deg)} }
    @keyframes cosmic-float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
    @keyframes chromatic-shift { 0%,100%{text-shadow:-1px 0 rgba(255,0,80,0.35), 1px 0 rgba(0,240,255,0.35)} 50%{text-shadow:-2px 0 rgba(255,0,80,0.5), 2px 0 rgba(0,240,255,0.5)} }
    @keyframes reality-breathe { 0%,100%{filter:hue-rotate(0deg) saturate(1);opacity:1} 50%{filter:hue-rotate(12deg) saturate(1.08);opacity:0.96} }
    @keyframes reality-drift { 0%,100%{background-position:0% 50%} 50%{background-position:100% 50%} }
    @keyframes conveyor-scroll { 0%{background-position:0 0} 100%{background-position:40px 0} }
    @keyframes conveyor-item-move { 0%{left:-10%} 100%{left:110%} }
    @keyframes hue-shift { 0%{filter:hue-rotate(0deg)} 50%{filter:hue-rotate(180deg)} 100%{filter:hue-rotate(360deg)} }
    @keyframes bubble-rise { 0%{transform:translateY(0) scale(1);opacity:0.6} 100%{transform:translateY(-80px) scale(0.3);opacity:0} }
    @keyframes pack-pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.02)} }
    @keyframes beam-sweep { 0%{transform:rotate(-25deg) scaleY(0.3);opacity:0} 30%{opacity:1} 100%{transform:rotate(-25deg) scaleY(1.2);opacity:0} }
    @keyframes beam-flash { 0%,100%{opacity:0.3} 50%{opacity:1} }
    .chromatic-text { animation: chromatic-shift 4.5s ease-in-out infinite; }
    .reality-warp-active .chromatic-text { animation: chromatic-shift 4.5s ease-in-out infinite; }
    #hud-header {
      position: relative; z-index: 30; flex-shrink: 0;
      display: flex; align-items: center; justify-content: space-between;
      padding: calc(0.75rem + env(safe-area-inset-top, 0)) 1rem 0.75rem;
    }
    .brand-sub { font-family: var(--font-mono); font-size: 0.55rem; letter-spacing: 0.35em; color: rgba(167,139,250,0.7); text-transform: uppercase; }
    .brand-title { font-family: var(--font-display); font-size: 0.875rem; letter-spacing: 0.15em; line-height: 1.2; font-weight: 700; }
    #screen-root {
      position: relative; z-index: 20;
      flex: 1 1 0; min-height: 0; width: 100%;
      overflow-y: auto; overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior-y: contain;
      touch-action: pan-y;
      padding: 0 1rem 1rem;
      scroll-padding-bottom: 1rem;
    }
    #screen-root::-webkit-scrollbar { width: 4px; }
    #screen-root::-webkit-scrollbar-thumb { background: var(--neon-purple); border-radius: 4px; }
    #bottom-dock {
      position: relative; z-index: 30; flex-shrink: 0;
      display: flex; justify-content: space-around;
      padding: 0.5rem 0.75rem calc(0.75rem + env(safe-area-inset-bottom, 0));
      background: rgba(12,1,26,0.95);
      border-top: 1px solid rgba(61,0,102,0.6);
    }
    .nav-btn { display: flex; flex-direction: column; align-items: center; gap: 0.25rem; background: none; border: none; color: var(--muted); cursor: pointer; padding: 0.35rem 0.5rem; font-family: var(--font-display); font-size: 0.5rem; letter-spacing: 0.08em; transition: color 0.2s, filter 0.2s; }
    .nav-btn.active { color: var(--green); filter: drop-shadow(0 0 8px rgba(57,255,20,0.7)); }
    .nav-btn svg { width: 1.5rem; height: 1.5rem; }
    .neon-card { background: var(--panel); backdrop-filter: blur(12px); border: 1px solid var(--neon-purple); border-radius: 16px; position: relative; overflow: hidden; }
    .neon-card-pulse { animation: neon-pulse 2.8s ease-in-out infinite; }
    .neon-card-green { border-color: rgba(57,255,20,0.55); }
    .neon-card-green.neon-card-pulse { animation: neon-pulse-green 2.8s ease-in-out infinite; }
    .neon-card-static { animation: none; }
    .game-btn { font-family: var(--font-display); font-weight: 600; font-size: 0.72rem; letter-spacing: 0.12em; text-transform: uppercase; padding: 12px 20px; border-radius: 10px; border: 1px solid rgba(132,204,22,0.55); background: linear-gradient(180deg, rgba(34,60,24,0.92), rgba(26,46,18,0.96)); color: var(--text); cursor: pointer; position: relative; overflow: hidden; transition: transform 0.15s, box-shadow 0.2s; box-shadow: 0 0 18px rgba(74,222,128,0.25), inset 0 1px 0 rgba(255,255,255,0.12); }
    .game-btn::after { content: ""; position: absolute; top: 0; left: 0; width: 40%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent); animation: shimmer-slide 3s ease-in-out infinite; }
    .game-btn:hover { transform: translateY(-2px); border-color: var(--neon-glow); }
    .game-btn:active { transform: translateY(0) scale(0.97); }
    .game-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    .game-btn-green { border-color: rgba(57,255,20,0.55); background: linear-gradient(180deg, rgba(20,80,20,0.85), rgba(10,40,10,0.95)); box-shadow: 0 0 18px rgba(57,255,20,0.3); }
    .game-btn-sm { font-size: 0.55rem; padding: 6px 10px; }
    .profile-ribbon { position: relative; display: flex; align-items: center; gap: 0.625rem; padding: 0.375rem 0.75rem 0.375rem 0.375rem; border-radius: 9999px; cursor: pointer; background: linear-gradient(135deg, rgba(61,0,102,0.85), rgba(31,0,51,0.75)); border: 1px solid rgba(168,85,247,0.45); box-shadow: 0 0 20px rgba(168,85,247,0.25); transition: transform 0.2s; }
    .profile-ribbon:hover { transform: scale(1.03); }
    .avatar-wrap { position: relative; width: 2.5rem; height: 2.5rem; flex-shrink: 0; }
    .avatar-ring { position: absolute; inset: -3px; border-radius: 50%; border: 2px solid transparent; border-top-color: var(--green); border-right-color: var(--neon-glow); animation: avatar-orbit 8s linear infinite; }
    .avatar-inner { position: absolute; inset: 2px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.125rem; background: linear-gradient(135deg, #3D0066, #0B001A); border: 2px solid rgba(168,85,247,0.5); }
    .screen-section { display: flex; flex-direction: column; gap: 1rem; padding-bottom: 1rem; }
    .section-label { font-family: var(--font-display); font-weight: 600; font-size: 0.6rem; letter-spacing: 0.2em; text-align: center; color: var(--muted); }
    .section-label-green { color: var(--green); }
    .flex-row { display: flex; align-items: center; gap: 0.75rem; }
    .flex-between { display: flex; align-items: center; justify-content: space-between; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.5rem; }
    .input-field { width: 100%; padding: 0.5rem 0.75rem; border-radius: 0.5rem; font-size: 0.75rem; font-family: var(--font-mono); background: rgba(0,0,0,0.4); border: 1px solid rgba(61,0,102,0.6); color: white; outline: none; }
    .input-field:focus { border-color: var(--pink); }
    .farm-tabs { display: flex; gap: 0.25rem; padding: 0.25rem; border-radius: 0.75rem; background: rgba(15,0,30,0.8); border: 1px solid rgba(61,0,102,0.6); }
    .farm-tab { flex: 1; padding: 0.5rem 0.25rem; border-radius: 0.5rem; border: none; background: none; font-family: var(--font-display); font-size: 0.5rem; letter-spacing: 0.05em; color: var(--muted); cursor: pointer; }
    .farm-tab.active { background: rgba(57,255,20,0.12); color: var(--green); border: 1px solid rgba(57,255,20,0.3); }
    .progress-bar { height: 0.5rem; border-radius: 9999px; overflow: hidden; background: rgba(31,0,51,0.8); }
    .progress-fill { height: 100%; border-radius: 9999px; background: linear-gradient(90deg, var(--pink), var(--green)); transition: width 0.3s; }
    .conveyor-belt { background: rgba(0,0,0,0.45); border: 1px solid rgba(61,0,102,0.5); border-radius: 0.5rem; height: 2.5rem; position: relative; overflow: hidden; margin-bottom: 0.75rem; }
    .conveyor-track { position: absolute; inset: 0; background: repeating-linear-gradient(90deg, rgba(168,85,247,0.15) 0 8px, rgba(57,255,20,0.08) 8px 16px); animation: conveyor-scroll 1.2s linear infinite; }
    .conveyor-item { position: absolute; top: 50%; transform: translateY(-50%); font-size: 1.125rem; animation: conveyor-item-move 3s linear infinite; }
    .holo-grid { position: relative; height: 280px; border-radius: 1rem; overflow: hidden; background: linear-gradient(180deg, rgba(31,0,51,0.6), rgba(12,1,26,0.9)); border: 1px solid rgba(61,0,102,0.6); }
    .holo-grid-lines { position: absolute; inset: 0; pointer-events: none; background-image: linear-gradient(rgba(168,85,247,0.08) 1px, transparent 1px), linear-gradient(90deg, rgba(168,85,247,0.08) 1px, transparent 1px); background-size: 24px 24px; }
    .holo-node { position: absolute; transition: transform 0.3s; cursor: pointer; border: none; background: none; padding: 0; }
    .holo-node-inner { width: 3.5rem; height: 3.5rem; border-radius: 0.75rem; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 1px solid rgba(168,85,247,0.4); }
    .holo-node.focused .holo-node-inner { ring: 2px solid var(--green); box-shadow: 0 0 20px rgba(57,255,20,0.4); outline: 2px solid var(--green); }
    .strain-card { position: relative; border-radius: 0.75rem; overflow: hidden; text-align: left; width: 100%; cursor: pointer; transition: transform 0.2s; border: none; color: inherit; font: inherit; }
    .strain-card:hover { transform: scale(1.02); }
    .strain-card.selected { outline: 2px solid #39FF14; }
    .liftable-wrap { cursor: pointer; }
    .card-lift-backdrop { position: fixed; inset: 0; z-index: 500; background: rgba(0,0,0,0.75); backdrop-filter: blur(10px); border: none; cursor: pointer; }
    .lift-shell {
      position: fixed; z-index: 600; left: 50%; top: 50%; transform: translate(-50%, -50%);
      width: min(360px, 92vw); max-height: 90vh; display: flex; flex-direction: column;
      pointer-events: none;
    }
    .lift-shell > * { pointer-events: auto; }
    .lift-hero { flex-shrink: 0; padding: 0.5rem 1rem 0; display: flex; justify-content: center; }
    .lift-hero .cr-card { pointer-events: none; max-width: 11rem; width: 100%; }
    .lift-hero .cr-card-lg .cr-card-frame { transform: scale(1.02); }
    .lift-meta {
      text-align: center; padding: 0.35rem 1rem 0.5rem; flex-shrink: 0;
      font-family: var(--font-mono); font-size: 0.55rem; color: var(--muted);
    }
    .lift-meta .lift-rarity { font-weight: 700; font-size: 0.65rem; }
    .lift-abilities {
      flex: 1; min-height: 0; overflow-y: auto; -webkit-overflow-scrolling: touch;
      margin: 0 0.75rem; padding: 0.65rem 0.75rem; border-radius: 0.75rem;
      background: rgba(0,0,0,0.45); border: 1px solid rgba(74,222,128,0.2);
    }
    .lift-abilities .lift-ability-row {
      padding: 0.5rem 0; border-bottom: 1px solid rgba(255,255,255,0.06);
      display: flex; align-items: flex-start; justify-content: space-between; gap: 0.5rem;
    }
    .lift-abilities .lift-ability-row:last-child { border-bottom: none; }
    .lift-footer {
      flex-shrink: 0; display: flex; gap: 0.5rem; padding: 0.75rem;
      border-top: 1px solid rgba(74,222,128,0.15); background: rgba(15,26,10,0.95);
      border-radius: 0 0 1rem 1rem;
    }
    .lift-footer .game-btn { flex: 1; font-size: 0.62rem; padding: 10px 8px; }
    .sort-chip-row {
      display: flex; flex-wrap: wrap; gap: 0.35rem;
      overflow-x: auto; -webkit-overflow-scrolling: touch; padding-bottom: 0.15rem;
    }
    .sort-chip {
      flex-shrink: 0; padding: 0.35rem 0.65rem; border-radius: 9999px;
      border: 1px solid rgba(74,222,128,0.25); background: rgba(0,0,0,0.35);
      color: var(--muted); font-family: var(--font-mono); font-size: 0.52rem;
      font-weight: 600; letter-spacing: 0.04em; cursor: pointer; transition: all 0.15s;
    }
    .sort-chip.active {
      border-color: var(--green); background: rgba(74,222,128,0.15); color: var(--green);
      box-shadow: 0 0 12px rgba(74,222,128,0.25);
    }
    .sort-chip:active { transform: scale(0.96); }
    .lifted-card { display: none; }
    .overlay { position: fixed; inset: 0; z-index: 7500; display: none; align-items: center; justify-content: center; padding: 1rem; }
    .overlay.open { display: flex; }
    .overlay-backdrop { position: absolute; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(12px); border: none; cursor: pointer; }
    .overlay-panel { position: relative; width: 100%; max-width: 24rem; max-height: 90vh; overflow-y: auto; border-radius: 1.5rem; background: rgba(15,0,28,0.92); border: 1px solid rgba(168,85,247,0.5); box-shadow: 0 0 60px rgba(168,85,247,0.3); }
    .overlay-panel::-webkit-scrollbar { width: 4px; }
    #overlay-profile { z-index: 8000; }
    #overlay-settings { z-index: 8500; align-items: flex-end; }
    #overlay-settings.open { align-items: center; }
    @media (min-width: 640px) { #overlay-settings.open { align-items: center; } }
    .profile-banner { height: 6rem; background: linear-gradient(160deg, #3D0066, #0B001A 40%, #1a0040); position: relative; }
    .profile-close { position: absolute; top: 0.75rem; right: 0.75rem; width: 2rem; height: 2rem; border-radius: 50%; border: 1px solid rgba(168,85,247,0.3); background: rgba(0,0,0,0.4); color: var(--muted); cursor: pointer; }
    .profile-avatar-lg { position: absolute; bottom: -2rem; left: 50%; transform: translateX(-50%); width: 4rem; height: 4rem; }
    .profile-body { padding: 2.5rem 1.25rem 1.25rem; }
    .flipper { display: flex; align-items: center; justify-content: center; gap: 0.25rem; flex-wrap: wrap; margin-bottom: 1rem; }
    .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.5rem; margin-bottom: 1rem; }
    .stat-box { text-align: center; padding: 0.5rem 0.25rem; }
    .stat-label { font-family: var(--font-mono); font-size: 0.45rem; color: var(--muted); }
    .stat-value { font-size: 0.6rem; font-weight: 700; color: #39FF14; overflow: hidden; text-overflow: ellipsis; }
    .avatar-picker { display: flex; flex-wrap: wrap; gap: 0.5rem; justify-content: center; margin-bottom: 1rem; }
    .avatar-opt { width: 2.25rem; height: 2.25rem; border-radius: 50%; font-size: 1.125rem; border: 1px solid rgba(168,85,247,0.4); background: rgba(31,0,51,0.8); cursor: pointer; }
    .avatar-opt.selected { outline: 2px solid #39FF14; transform: scale(1.1); }
    .reality-warp-overlay { position: fixed; inset: 0; z-index: 9000; pointer-events: none; display: none; animation: reality-breathe 6s ease-in-out infinite; background: radial-gradient(ellipse at 30% 40%, rgba(74,222,128,0.08) 0%, transparent 50%), radial-gradient(ellipse at 70% 60%, rgba(250,204,21,0.06) 0%, transparent 45%), radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.35) 100%); mix-blend-mode: soft-light; }
    .reality-warp-active #phone-shell { animation: reality-breathe 8s ease-in-out infinite; }
    .reality-warp-overlay.active { display: block; }
    .dialogue-bubble {
      position: absolute; top: calc(5.5rem + env(safe-area-inset-top, 0)); right: 0.75rem;
      left: auto; transform: none; z-index: 40;
      max-width: min(14rem, calc(100% - 2rem)); padding: 0.5rem 0.75rem;
      border-radius: 0.75rem; background: rgba(26,46,18,0.88);
      border: 1px solid rgba(74,222,128,0.3); font-family: var(--font-mono);
      font-size: 0.58rem; color: var(--green); line-height: 1.4;
      pointer-events: none; opacity: 0; transition: opacity 0.4s;
    }
    .dialogue-bubble.visible { opacity: 1; }
    .plant-header { display: flex; align-items: center; gap: 0.5rem; flex: 1; min-width: 0; margin: 0 0.5rem; }
    #plant-mascot { font-size: 1.75rem; line-height: 1; flex-shrink: 0; transition: filter 0.3s; }
    #plant-label { font-family: var(--font-mono); font-size: 0.5rem; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .player-pick-grid { display: flex; flex-direction: column; gap: 0.75rem; }
    .player-pick-card {
      display: flex; align-items: center; gap: 1rem; width: 100%; padding: 1rem 1.25rem;
      border-radius: 1rem; border: 1px solid rgba(168,85,247,0.5); background: rgba(31,0,51,0.7);
      color: var(--text); cursor: pointer; text-align: left; transition: border-color 0.2s, transform 0.15s;
    }
    .player-pick-card:hover { border-color: var(--green); transform: scale(1.02); }
    #overlay-player-select { z-index: 9500; }
    .transaction-beam { position: fixed; inset: 0; z-index: 7000; pointer-events: none; display: none; align-items: center; justify-content: center; flex-direction: column; }
    .transaction-beam.active { display: flex; }

    /* —— Clash Royale style strain cards —— */
    .cr-card {
      border: none; background: none; padding: 0; cursor: pointer; text-align: center;
      transition: transform 0.22s cubic-bezier(0.34, 1.4, 0.64, 1), filter 0.2s ease;
      animation: none; width: 100%; perspective: 600px;
    }
    .cr-card:hover { transform: translateY(-8px) rotate(-1deg) scale(1.03); filter: brightness(1.06); }
    .cr-card:active { transform: translateY(-2px) scale(0.96); transition-duration: 0.08s; }
    .cr-card.selected .cr-card-frame {
      outline: 3px solid #39FF14; outline-offset: 2px;
      box-shadow: 0 0 24px rgba(57,255,20,0.55), 0 12px 32px rgba(0,0,0,0.6);
    }
    .cr-card-frame {
      position: relative; overflow: visible; aspect-ratio: 3 / 4;
      border-radius: 0.75rem; border: 3px solid var(--cr-border, #6b7280);
      box-shadow:
        0 10px 28px rgba(0,0,0,0.55),
        inset 0 2px 0 rgba(255,255,255,0.18),
        inset 0 -3px 0 rgba(0,0,0,0.35);
      background: #1A1209;
    }
    .cr-card-bevel {
      position: absolute; inset: 3px; border-radius: 0.55rem; pointer-events: none; z-index: 4;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.12), inset 0 -2px 4px rgba(0,0,0,0.25);
    }
    .cr-card-arena {
      position: absolute; inset: 3px; bottom: 2.1rem; border-radius: 0.55rem 0.55rem 0 0;
      pointer-events: none; z-index: 0;
      background: var(--cr-arena, radial-gradient(ellipse 90% 70% at 50% 85%, #2D5A27 0%, #1A1209 70%));
    }
    .cr-card-art {
      position: absolute; left: 0; right: 0; top: 8%; bottom: 2.1rem;
      display: flex; align-items: flex-end; justify-content: center; z-index: 1;
      padding: 0 0.15rem;
    }
    .cr-card-art img, .cr-card-art .cr-planet-orb {
      width: 100%; max-height: 100%; object-fit: contain;
      filter: drop-shadow(0 6px 8px rgba(0,0,0,0.45));
    }
    .cr-art-wrap {
      width: 92%; max-height: 100%; display: flex; align-items: flex-end; justify-content: center;
      transform-origin: bottom center;
      animation: cr-card-idle 3.5s ease-in-out infinite;
    }
    .cr-tier-epic .cr-art-wrap, .cr-tier-legend .cr-art-wrap,
    .cr-tier-champion .cr-art-wrap, .cr-tier-god .cr-art-wrap {
      animation: cr-card-idle 3s ease-in-out infinite, cr-card-breathe 4s ease-in-out infinite;
    }
    @keyframes cr-card-idle { 0%,100%{transform:translateY(0) scale(1)} 50%{transform:translateY(-3px) scale(1.02)} }
    @keyframes cr-card-breathe { 0%,100%{filter:drop-shadow(0 6px 8px rgba(0,0,0,0.45))} 50%{filter:drop-shadow(0 8px 14px rgba(255,215,0,0.35))} }
    .cr-planet-orb {
      width: 4.5rem !important; height: 4.5rem; border-radius: 50%;
      box-shadow: inset -6px -8px 16px rgba(0,0,0,0.4), 0 4px 12px rgba(0,0,0,0.35);
    }
    .cr-badge {
      position: absolute; z-index: 5; display: flex; align-items: center; justify-content: center;
      font-family: "Fredoka", var(--font-display); font-weight: 700; line-height: 1;
      box-shadow: 0 3px 0 rgba(0,0,0,0.45), 0 4px 10px rgba(0,0,0,0.35);
    }
    .cr-badge-thc {
      top: -0.35rem; left: -0.35rem; min-width: 1.65rem; height: 1.65rem;
      border-radius: 50%; border: 2px solid #1A1209;
      background: radial-gradient(circle at 35% 30%, #C084FC, #7C3AED 55%, #4C1D95);
      color: #fff; font-size: 0.62rem; padding: 0 0.2rem;
    }
    .cr-badge-thc.cr-badge-sm { font-size: 0.5rem; min-width: 1.5rem; height: 1.5rem; }
    .cr-badge-lvl {
      top: -0.35rem; right: -0.35rem; min-width: 1.75rem; height: 1.55rem;
      border-radius: 0.35rem; border: 2px solid #1A1209;
      background: linear-gradient(180deg, #FDE68A 0%, #F59E0B 45%, #B45309 100%);
      color: #1A1209; font-size: 0.55rem; padding: 0 0.25rem;
    }
    .cr-badge-lvl span { font-size: 0.42rem; font-weight: 600; opacity: 0.85; margin-right: 1px; }
    .cr-badge-dps {
      top: -0.35rem; left: 50%; transform: translateX(-50%);
      min-width: 1.85rem; height: 1.45rem; padding: 0 0.3rem;
      border-radius: 0.35rem; border: 2px solid #1A1209;
      background: linear-gradient(180deg, #4ADE80 0%, #16A34A 50%, #14532D 100%);
      color: #fff; font-size: 0.48rem; letter-spacing: 0.02em;
    }
    .cr-badge-dps span { font-size: 0.38rem; opacity: 0.85; display: block; line-height: 1; }
    .cr-badge-qty {
      bottom: 2rem; left: -0.25rem; min-width: 1.35rem; height: 1.35rem;
      border-radius: 50%; border: 2px solid #1A1209;
      background: linear-gradient(180deg, #4ADE80, #16A34A);
      color: #fff; font-size: 0.48rem;
    }
    .cr-badge-tag {
      bottom: 2rem; right: -0.2rem; font-size: 0.65rem;
      filter: drop-shadow(0 2px 3px rgba(0,0,0,0.5));
    }
    .cr-card-banner {
      position: absolute; left: 0; right: 0; bottom: 0; z-index: 3;
      min-height: 2.1rem; padding: 0.3rem 0.35rem;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(180deg, rgba(0,0,0,0.15) 0%, rgba(0,0,0,0.88) 25%, rgba(0,0,0,0.95) 100%);
      border-radius: 0 0 0.55rem 0.55rem;
      border-top: 2px solid rgba(0,0,0,0.5);
    }
    .cr-card-name {
      font-family: "Fredoka", var(--font-display); font-weight: 700;
      font-size: 0.58rem; letter-spacing: 0.02em; line-height: 1.15;
      color: #fff; text-shadow: 0 1px 0 #000, 0 2px 4px rgba(0,0,0,0.6);
      overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
      word-break: break-word;
    }
    .cr-card-shine {
      position: absolute; inset: 3px; bottom: 2.1rem; border-radius: 0.55rem 0.55rem 0 0;
      pointer-events: none; z-index: 2; opacity: 0;
      background: linear-gradient(115deg, transparent 30%, rgba(255,255,255,0.22) 48%, transparent 65%);
    }
    @keyframes cr-shine-sweep {
      0%,70%,100%{transform:translateX(-120%) skewX(-12deg);opacity:0}
      75%{opacity:1} 95%{transform:translateX(180%) skewX(-12deg);opacity:0}
    }
    /* tier borders + arenas */
    .cr-tier-street, .cr-tier-common { --cr-border: #6B7280; --cr-arena: radial-gradient(ellipse 95% 75% at 50% 90%, #3D6B35 0%, #1F2937 55%, #111827 100%); }
    .cr-tier-rare { --cr-border: #38BDF8; box-shadow: 0 0 14px #38bdf866, 0 10px 28px rgba(0,0,0,0.55), inset 0 2px 0 rgba(255,255,255,0.18); }

    .cr-tier-legend { --cr-border: #FACC15; box-shadow: 0 0 22px #facc1566, 0 12px 32px rgba(0,0,0,0.55), inset 0 2px 0 rgba(255,255,255,0.22); }
    .cr-tier-champion { --cr-border: #FB923C; box-shadow: 0 0 26px #fb923c88, 0 12px 32px rgba(0,0,0,0.55), inset 0 2px 0 rgba(255,255,255,0.22); }
    .cr-tier-god { --cr-border: #fff; box-shadow: 0 0 32px rgba(255,255,255,0.45), 0 0 48px rgba(168,85,247,0.35), 0 14px 36px rgba(0,0,0,0.6), inset 0 2px 0 rgba(255,255,255,0.3); animation: cr-god-pulse 2.5s ease-in-out infinite; }
    .cr-tier-rare .cr-card-arena { --cr-arena: radial-gradient(ellipse 95% 75% at 50% 90%, #1E5A8A 0%, #1E3A5F 55%, #0F172A 100%); }
    .cr-tier-epic .cr-card-arena { --cr-arena: radial-gradient(ellipse 95% 75% at 50% 90%, #5B21B6 0%, #3B0764 55%, #1A0533 100%); }
    .cr-tier-legend .cr-card-arena { --cr-arena: radial-gradient(ellipse 95% 75% at 50% 90%, #854D0E 0%, #422006 55%, #1A1209 100%); }
    .cr-tier-champion .cr-card-arena { --cr-arena: radial-gradient(ellipse 95% 75% at 50% 90%, #C2410C 0%, #7C2D12 55%, #1A1209 100%); }
    .cr-tier-god .cr-card-arena { --cr-arena: radial-gradient(ellipse 95% 75% at 50% 90%, #4C1D95 0%, #1E1B4B 40%, #0C011A 100%); }
    .cr-tier-epic .cr-card-shine, .cr-tier-legend .cr-card-shine, .cr-tier-champion .cr-card-shine, .cr-tier-god .cr-card-shine {
      opacity: 1; animation: cr-shine-sweep 3.5s ease-in-out infinite;

    .cr-tier-epic .cr-card-art img, .cr-tier-legend .cr-card-art img,
    .cr-tier-champion .cr-card-art img, .cr-tier-god .cr-card-art img {
      animation: cr-card-idle 3s ease-in-out infinite, cr-card-breathe 4s ease-in-out infinite;

    #hud-xp-strip {

    .hud-xp-bar { height: 0.35rem; border-radius: 9999px; overflow: hidden; background: rgba(31,0,51,0.9); }
